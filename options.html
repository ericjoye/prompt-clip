<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Clip — Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 32px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .section {
      margin-bottom: 32px;
    }
    .section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #10b981;
    }
    .template-list {
      list-style: none;
    }
    .template-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .template-item label {
      font-size: 14px;
      flex: 1;
    }
    .template-item .toggle {
      appearance: none;
      width: 40px;
      height: 22px;
      background: #333;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .template-item .toggle:checked {
      background: #10b981;
    }
    .template-item .toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
    }
    .template-item .toggle:checked::after {
      left: 20px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #aaa;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
    }
    .field input:focus {
      outline: none;
      border-color: #10b981;
    }
    .default-template-wrapper {
      margin-bottom: 16px;
    }
    .default-template-wrapper label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #aaa;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
    }
    .save-btn {
      background: #10b981;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .save-btn:hover {
      background: #059669;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #10b981;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>Prompt Clip</h1>
  <p class="subtitle">Chrome extension settings</p>

  <div class="section">
    <h2>Templates</h2>
    <ul class="template-list" id="template-list">
      <!-- Filled by JS -->
    </ul>
  </div>

  <div class="section">
    <h2>Defaults</h2>
    <div class="default-template-wrapper">
      <label for="default-template">Default template (used by keyboard shortcut)</label>
      <select id="default-template"></select>
    </div>
  </div>

  <div class="section">
    <h2>Privacy</h2>
    <p style="font-size: 13px; color: #888; line-height: 1.5;">
      Prompt Clip does not collect, transmit, or store any personal data beyond what is saved locally in your browser. No accounts, no network requests, no tracking.
    </p>
  </div>

  <button class="save-btn" id="save-btn">Save Settings</button>
  <p class="status" id="status">Settings saved!</p>

  <script src="options.js"></script>
</body>
</html>
